workflows:
  expo-app-workflow:
    name: DemoExpo Build
    instance_type: mac_mini_m2 
    working_directory: apps/demoexpo
    
    # This section enables automatic builds on push
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          
    environment:
      node: 20 # Using a specific version is more stable than "latest"
      vars:
        PACKAGE_NAME: "com.nikhil.demoexpo"
    
    scripts:
      - name: Install dependencies
        script: |
          npm install -g pnpm
          pnpm install
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform android
      - name: Build Android (APK)
        script: |
          cd android && ./gradlew assembleRelease
          
    # This ensures you can actually download the file after it finishes
    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - nicksalvatore000@gmail.com # Updated from your screenshot

